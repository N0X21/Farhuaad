<svg width="240" height="240" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="brokenGrid" width="50" height="50" patternUnits="userSpaceOnUse">
      
      <!-- сетка -->
      <path d="M50 0 H0 V50" fill="none" stroke="#ececec" stroke-width="1"></path>

      <!-- смещения -->
      <path d="M10 0 V20" stroke="#dcdcdc" stroke-width="1"></path>
      <path d="M30 30 H50" stroke="#dcdcdc" stroke-width="1"></path>

      <!-- точки не по центру -->
      <circle cx="17" cy="33" r="1.5" fill="#cfcfcf"></circle>
      <circle cx="41" cy="12" r="1" fill="#d8d8d8"></circle>

    </pattern>
  </defs>
  <rect width="100%" height="100%" fill="url(#brokenGrid)"></rect>
</svg>