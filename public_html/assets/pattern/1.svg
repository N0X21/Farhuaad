<svg width="240" height="240" viewBox="0 0 240 240" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="pattern" width="60" height="60" patternUnits="userSpaceOnUse">
      
      <!-- базовая сетка -->
      <path d="M60 0 H0 V60" fill="none" stroke="#e8e8e8" stroke-width="1"></path>

      <!-- акцентные линии -->
      <path d="M0 30 H60" stroke="#f1f1f1" stroke-width="1"></path>
      <path d="M30 0 V60" stroke="#f1f1f1" stroke-width="1"></path>

      <!-- дизайнерские элементы -->
      <circle cx="30" cy="30" r="1.5" fill="#cfcfcf"></circle>
      <circle cx="10" cy="50" r="1" fill="#d8d8d8"></circle>
      <circle cx="50" cy="10" r="1" fill="#d8d8d8"></circle>

      <!-- случайный штрих -->
      <path d="M5 5 L15 5" stroke="#e0e0e0" stroke-width="1"></path>
      <path d="M45 55 L55 55" stroke="#e0e0e0" stroke-width="1"></path>

      <!-- микро-крест -->
      <path d="M30 15 L30 19 M28 17 L32 17" stroke="#d0d0d0" stroke-width="1"></path>
      
    </pattern>
  </defs>

  <rect width="100%" height="100%" fill="url(#pattern)"></rect>
</svg>